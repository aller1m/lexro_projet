<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>LeXro - Estatísticas Detalhadas</title>
    <!-- CSS Separado -->
    <link rel="stylesheet" href="CSS/Logolex2.css">
    <link rel="stylesheet" href="CSS/estati.css">
    <link rel="stylesheet" href="CSS/abinhas.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.4.2/css/all.css">
  

</head>
<body>
    <a href="index.html" id="btnvoltar">☰</a>
    <button id="btntema" class="btntema">
        <div class="circle"></div>
        <i class="fa-solid fa-star star"></i>
      </button>
    <div class="container-detalhes">
        <h1 style=" font-family:'Oxanium', sans-serif;">Análise de Desempenho</h1>
        
        <div class="grid-cards">
            <div class="card"><p>Taxa de Vitória</p><h3 id="taxa-vitoria">...</h3></div>
            <div class="card"><p>Média de Tentativas</p><h3 id="media-tentativas">...</h3></div>
            <div class="card"><p>Melhor Tempo</p><h3 id="melhor-tempo">...</h3></div>
        </div>

        <h2 style=" font-family:'Oxanium', sans-serif;">Histórico Recente</h2>
        <table class="historico-tabela">
            <thead>
                <tr style=" font-family:'Oxanium', sans-serif;">
                    <th>Data</th>
                    <th>Modo</th>
                    <th>Resultado</th>
                    <th>Tentativas</th>
                    <th>Tempo</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo"></tbody>
        </table>
    
    </div>

    <!-- JS Separado -->
    <script src="JS/StatsDetalhado.js"></script>
    <script src="JS/Abas.js"></script>
    <script src="JS/tema.js"></script>
</body>
</html>
